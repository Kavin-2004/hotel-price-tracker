<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Price Tracker — Coimbatore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --surface2: #1b2440;
      --border: #232e4a;
      --accent: #4f8ef7;
      --accent2: #38d9a9;
      --text: #e8edf5;
      --muted: #7889aa;
      --booking: #4f8ef7;
      --oyo: #ff5a5f;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* HEADER */
    header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .brand h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .brand h1 span { color: var(--accent); }
    .brand p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .last-updated { font-size: 0.75rem; color: var(--muted); }

    /* MAIN */
    main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

    /* PAGE VIEWS */
    .page { display: none; }
    .page.active { display: block; }

    /* HOME PAGE — PLATFORM SELECTION */
    .home-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .home-sub { text-align: center; color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; }

    .platform-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 600px; margin: 0 auto 3rem; }
    .platform-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .platform-card:hover { border-color: var(--accent); transform: translateY(-3px); background: var(--surface2); }
    .platform-card.booking:hover { border-color: var(--booking); }
    .platform-card.oyo:hover { border-color: var(--oyo); }
    .platform-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .platform-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
    .platform-name.booking { color: var(--booking); }
    .platform-name.oyo { color: var(--oyo); }
    .platform-desc { font-size: 0.8rem; color: var(--muted); }

    .fetch-all-btn {
      display: block;
      margin: 0 auto;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .fetch-all-btn:hover { background: #3a7ae4; }

    /* HOTEL LIST PAGE */
    .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }
    .back-btn:hover { background: var(--surface2); }
    .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .page-title span.booking { color: var(--booking); }
    .page-title span.oyo { color: var(--oyo); }
    .page-title span.all { color: var(--accent2); }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      color: var(--text);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
      margin-left: auto;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--muted); }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.2rem; }
    .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-card .value { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
    .stat-card .value.green { color: var(--accent2); }
    .stat-card .value.blue { color: var(--accent); }
    .stat-card .value.red { color: var(--oyo); }

    /* TABLE */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 0.85rem 1.2rem; text-align: left; font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--surface2); cursor: pointer; }
    thead th:hover { color: var(--text); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 0.9rem 1.2rem; font-size: 0.88rem; }
    .rank { color: var(--muted); font-size: 0.78rem; }
    .hotel-name { font-weight: 500; }
    .price { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; color: var(--accent2); }
    .source-badge { display: inline-block; padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; }
    .source-booking { background: rgba(79,142,247,0.15); color: var(--booking); }
    .source-oyo { background: rgba(255,90,95,0.15); color: var(--oyo); }

    /* HOTEL DETAIL PAGE */
    .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
    .detail-hotel-name { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
    .detail-price { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; color: var(--accent2); margin-bottom: 0.5rem; }
    .detail-source { margin-bottom: 1rem; }
    .detail-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .detail-info-item { background: var(--surface2); border-radius: 10px; padding: 1rem; }
    .detail-info-item .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .detail-info-item .val { font-size: 0.95rem; font-weight: 500; }
    .visit-btn { display: inline-block; margin-top: 1.5rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 0.7rem 1.5rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: none; transition: background 0.2s; }
    .visit-btn:hover { background: #3a7ae4; }
    .visit-btn.oyo { background: var(--oyo); }
    .visit-btn.oyo:hover { background: #e04a4f; }

    /* STATES */
    .state-box { text-align: center; padding: 4rem 2rem; }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .state-box .title { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .state-box .desc { color: var(--muted); font-size: 0.85rem; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      main { padding: 1rem; }
      .platform-grid { grid-template-columns: 1fr; }
      .search-box { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>🏨 Hotel Tracker <span>Coimbatore</span></h1>
    <p>Live prices from Booking.com & OYO</p>
  </div>
  <div class="last-updated" id="lastUpdated">—</div>
</header>

<main>

  <!-- PAGE 1: HOME — Platform Selection -->
  <div class="page active" id="page-home">
    <div class="home-title">Compare Hotel Prices</div>
    <div class="home-sub">Select a platform to browse live hotel prices in Coimbatore</div>

    <div class="platform-grid">
      <div class="platform-card booking" onclick="loadPlatform('booking.com')">
        <div class="platform-icon">🌐</div>
        <div class="platform-name booking">Booking.com</div>
        <div class="platform-desc">International platform, best prices</div>
      </div>
      <div class="platform-card oyo" onclick="loadPlatform('oyo')">
        <div class="platform-icon">🏩</div>
        <div class="platform-name oyo">OYO</div>
        <div class="platform-desc">Budget friendly Indian hotels</div>
      </div>
    </div>

    <button class="fetch-all-btn" onclick="fetchAll()">🔍 Fetch All Platforms</button>
  </div>

  <!-- PAGE 2: HOTEL LIST -->
  <div class="page" id="page-list">
    <div class="page-header">
      <button class="back-btn" onclick="goHome()">← Back</button>
      <div class="page-title" id="list-title">Hotels</div>
      <input type="text" class="search-box" placeholder="🔎 Search hotel..." oninput="filterHotels()" id="searchBox" />
    </div>

    <div class="stats" id="listStats"></div>
    <div class="table-wrap" id="hotelTable"></div>
  </div>

  <!-- PAGE 3: HOTEL DETAIL -->
  <div class="page" id="page-detail">
    <div class="page-header">
      <button class="back-btn" onclick="goBack()">← Back to List</button>
      <div class="page-title">Hotel Details</div>
    </div>
    <div id="detailContent"></div>
  </div>

</main>

<script>
  let allData = [];
  let currentPlatform = 'all';
  let filteredData = [];
  let sortCol = 'price';
  let sortDir = 1;
  let lastPage = 'home';

  // ---- NAVIGATION ----
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function goHome() {
    showPage('page-home');
    lastPage = 'home';
  }

  function goBack() {
    showPage('page-list');
  }

  // ---- FETCH DATA ----
  async function loadPlatform(platform) {
    currentPlatform = platform;
    showPage('page-list');
    lastPage = 'list';

    const titleEl = document.getElementById('list-title');
    const color = platform === 'booking.com' ? 'booking' : 'oyo';
    const label = platform === 'booking.com' ? 'Booking.com' : 'OYO';
    titleEl.innerHTML = `<span class="${color}">${label}</span> Hotels`;

    if (allData.length > 0) {
      renderList();
      return;
    }

    showLoading();
    await scrape();
    renderList();
  }

  async function fetchAll() {
    currentPlatform = 'all';
    showPage('page-list');
    lastPage = 'list';
    document.getElementById('list-title').innerHTML = `<span class="all">All Platforms</span>`;
    showLoading();
    await scrape();
    renderList();
  }

  async function scrape() {
    try {
      const res = await fetch('/api/scrape');
      const json = await res.json();
      if (json.success) {
        allData = json.data;
        document.getElementById('lastUpdated').textContent = 'Updated: ' + json.last_updated;
      }
    } catch (e) {
      showError(e.message);
    }
  }

  function showLoading() {
    document.getElementById('listStats').innerHTML = '';
    document.getElementById('hotelTable').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div class="title">Fetching live prices...</div>
        <div class="desc">Visiting ${currentPlatform === 'all' ? 'Booking.com & OYO' : currentPlatform} — please wait 30–60 seconds</div>
      </div>`;
  }

  // ---- RENDER LIST ----
  function renderList() {
    const query = document.getElementById('searchBox').value.toLowerCase();
    filteredData = allData.filter(d => {
      const matchPlatform = currentPlatform === 'all' || d.source === currentPlatform;
      const matchSearch = d.hotel_name.toLowerCase().includes(query);
      return matchPlatform && matchSearch;
    });

    filteredData.sort((a, b) => {
      const av = sortCol === 'price' ? a.price : a[sortCol];
      const bv = sortCol === 'price' ? b.price : b[sortCol];
      return av > bv ? sortDir : av < bv ? -sortDir : 0;
    });

    // Stats
    const prices = filteredData.map(d => d.price);
    const booking = filteredData.filter(d => d.source === 'booking.com');
    const oyo = filteredData.filter(d => d.source === 'oyo');
    document.getElementById('listStats').innerHTML = `
      <div class="stat-card"><div class="label">Total Hotels</div><div class="value blue">${filteredData.length}</div></div>
      <div class="stat-card"><div class="label">Cheapest</div><div class="value green">${prices.length ? '₹' + Math.min(...prices).toLocaleString() : '—'}</div></div>
      <div class="stat-card"><div class="label">Average</div><div class="value">${prices.length ? '₹' + Math.round(prices.reduce((a,b)=>a+b,0)/prices.length).toLocaleString() : '—'}</div></div>
      ${currentPlatform === 'all' ? `<div class="stat-card"><div class="label">Booking.com</div><div class="value blue">${booking.length}</div></div><div class="stat-card"><div class="label">OYO</div><div class="value red">${oyo.length}</div></div>` : ''}
    `;

    if (!filteredData.length) {
      document.getElementById('hotelTable').innerHTML = `<div class="state-box"><div class="icon">🔍</div><div class="title">No hotels found</div><div class="desc">Try a different search</div></div>`;
      return;
    }

    const rows = filteredData.map((d, i) => {
      const src = d.source === 'booking.com' ? 'source-booking' : 'source-oyo';
      const label = d.source === 'booking.com' ? 'Booking.com' : 'OYO';
      return `<tr onclick="showDetail(${i})">
        <td class="rank">#${i+1}</td>
        <td class="hotel-name">${d.hotel_name}</td>
        <td class="price">₹${d.price.toLocaleString()}</td>
        <td><span class="source-badge ${src}">${label}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('hotelTable').innerHTML = `
      <table>
        <thead><tr>
          <th onclick="sortBy('rank')">#</th>
          <th onclick="sortBy('hotel_name')">Hotel Name ↕</th>
          <th onclick="sortBy('price')">Price / Night ↕</th>
          <th>Source</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterHotels() { renderList(); }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderList();
  }

  // ---- HOTEL DETAIL ----
  function showDetail(index) {
    const hotel = filteredData[index];
    showPage('page-detail');

    const isBooking = hotel.source === 'booking.com';
    const srcClass = isBooking ? 'source-booking' : 'source-oyo';
    const srcLabel = isBooking ? 'Booking.com' : 'OYO';
    const btnClass = isBooking ? '' : 'oyo';
    const searchUrl = isBooking
      ? `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(hotel.hotel_name + ' Coimbatore')}&selected_currency=INR`
      : `https://www.oyorooms.com/search?location=coimbatore&q=${encodeURIComponent(hotel.hotel_name)}`;

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-card">
        <div class="detail-hotel-name">${hotel.hotel_name}</div>
        <div class="detail-price">₹${hotel.price.toLocaleString()}<span style="font-size:1rem; color:var(--muted); font-weight:400"> / night</span></div>
        <div class="detail-source"><span class="source-badge ${srcClass}">${srcLabel}</span></div>
        <div class="detail-info">
          <div class="detail-info-item">
            <div class="label">City</div>
            <div class="val">Coimbatore</div>
          </div>
          <div class="detail-info-item">
            <div class="label">Platform</div>
            <div class="val">${srcLabel}</div>
          </div>
          <div class="detail-info-item">
            <div class="label">Price / Night</div>
            <div class="val">₹${hotel.price.toLocaleString()}</div>
          </div>
          <div class="detail-info-item">
            <div class="label">Last Updated</div>
            <div class="val">${document.getElementById('lastUpdated').textContent.replace('Updated: ', '')}</div>
          </div>
        </div>
        <a href="${searchUrl}" target="_blank" class="visit-btn ${btnClass}">
          View on ${srcLabel} →
        </a>
      </div>`;
  }
</script>
</body>
</html>
